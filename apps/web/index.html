    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "José Torres",
        "url": "https://jose-torres.dev",
        "jobTitle": "Full Stack Developer",
        "description": "Full Stack Developer with 7+ years of experience building web and mobile applications.",
        "sameAs": [
          "https://github.com/jose-torres123",
          "https://www.linkedin.com/in/jose-torres-ad13"
        ],
        "knowsAbout": ["React", "TypeScript", "Node.js", "Next.js", "PostgreSQL", "Supabase"]
      }
    </script>

    <!-- Prevent FOUC for dark mode -->
    <script>
      (function () {
        var theme = localStorage.getItem('portfolio-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || ((!theme || theme === 'system') && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
